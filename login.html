<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Tickect Master</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(145deg, #1CB5E0, #000046);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
      animation: fadeIn 1.2s ease-in-out;
    }

    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      width: 90%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      background-color: #fff;
      color: #000046;
      padding: 12px;
      border: none;
      border-radius: 25px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
      margin-top: 15px;
    }

    button:hover {
      background-color: #eee;
    }

    .secondary-btn {
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
      margin-top: 10px;
    }

    .secondary-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login to Continue</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
      <button type="button" id="forgotBtn" class="secondary-btn">Forgotten Password?</button>
    </form>
  </div>

  <script>
    // Forgot password button redirect
    document.getElementById("forgotBtn").addEventListener("click", function() {
      window.location.href = "forgot.html";
    });

    // Login logic
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        // ====== CLOUD LOGIN (replace with your backend API URL) ======
        const response = await fetch("http://localhost:5000/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Save session in localStorage (so they stay logged in)
          localStorage.setItem("kingc_user", JSON.stringify(data.user));

          alert("Login successful! Welcome back, " + data.user.name);
          window.location.href = "dashboard.html";
        } else {
          alert(data.message || "Invalid login. Please try again.");
        }
      } catch (error) {
        alert("Network error: please check your connection.");
      }
    });
  </script>
</body>
</html>
